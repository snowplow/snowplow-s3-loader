name: CI

on:
  push:
    tags:
      - '*'
  pull_request:

jobs:
  test:
    if: ${{ github.event.repository.private == true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: coursier/cache-action@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests for core/
        run: sbt "project core; test"

      - name: Run tests for aws/
        run: sbt "project aws; test"

      - name: Check code formatting
        run: sbt scalafmtCheckAll

      - name: Check sbt formatting
        run: sbt scalafmtSbtCheck

  publish_docker:
    needs: test
    if: ${{ github.event.repository.private == true && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - aws

    steps:
      - uses: actions/checkout@v4

      - uses: coursier/cache-action@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Login to Docker Hub
        run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Stage the Docker build
        run: sbt "project ${{ matrix.app}}" docker:stage

      - name: Stage the distroless Docker build
        run: sbt "project ${{ matrix.app}}Distroless" docker:stage

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: snowplow/snowplow-s3-loader
          tags: |
            type=raw,value=latest,enable=${{ !contains(github.ref_name, 'rc') }}
            type=raw,value=${{ github.ref_name }}
          flavor: |
            latest=false

      - name: Docker metadata distroless
        id: metaDistroless
        uses: docker/metadata-action@v3
        with:
          images: snowplow/snowplow-s3-loader
          tags: |
            type=raw,value=latest-distroless,enable=${{ !contains(github.ref_name, 'rc') }}
            type=raw,value=${{ github.ref_name }}-distroless
          flavor: |
            latest=false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Push image
        uses: docker/build-push-action@v2
        with:
          context: modules/${{ matrix.app }}/target/docker/stage
          file: modules/${{ matrix.app }}/target/docker/stage/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          push: true

      - name: Push distroless image
        uses: docker/build-push-action@v2
        with:
          context: modules/distroless/${{ matrix.app }}/target/docker/stage
          file: modules/distroless/${{ matrix.app }}/target/docker/stage/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.metaDistroless.outputs.tags }}
          push: true

      - name: Build local distroless image needed for Snyk
        if: ${{ !contains(github.ref_name, 'rc') }}
        run: sbt "project ${{ matrix.app }}Distroless" docker:publishLocal

      - name: Snyk monitor
        uses: snyk/actions/docker@master
        if: ${{ !contains(github.ref_name, 'rc') }}
        with:
          image: "snowplow/snowplow-s3-loader:${{ github.ref_name }}-distroless"
          args: "--app-vulns --org=99605b41-ca0f-42c9-a9ff-45c201a10a26"
          command: monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}